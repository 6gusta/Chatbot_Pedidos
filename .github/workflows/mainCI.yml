name: Simple CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Baixar o código do repositório
        uses: actions/checkout@v3

      - name: 🔧 Configurar o ambiente (Java 21)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: ✅ Verificar estrutura do projeto
        run: ls -la

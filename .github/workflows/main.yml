name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Baixar o código do repositório
        uses: actions/checkout@v3

      - name: 🔧 Configurar o ambiente (Java 21)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'


      # 2️⃣ Build e Empacotamento
      - name: 🚀 Gerar o build final
        run: mvn package

      # 3️⃣ Verificações de Qualidade
      - name: 🔎 Rodar o SonarQube (ou ferramenta alternativa)
        run: mvn sonar:sonar -Dsonar.projectKey=meu-projeto -Dsonar.host.url=https://sonarqube.meu-servidor.com
